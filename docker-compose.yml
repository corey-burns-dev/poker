services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    working_dir: /app
    command: sh -lc "bun install && bun run dev"
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_URL: http://localhost:4000
      VITE_BACKEND_WS_URL: ws://localhost:4000/socket
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app
    command: sh -lc "mix deps.get && mix phx.server"
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      PHX_SERVER: "true"
    volumes:
      - ./backend:/app
      - backend_deps:/app/deps
      - backend_build:/app/_build

volumes:
  frontend_node_modules:
  backend_deps:
  backend_build:
