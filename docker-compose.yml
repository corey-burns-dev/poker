services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app/frontend
    command: sh -lc "bun install && bun run dev"
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_URL: http://localhost:4000
      VITE_BACKEND_WS_URL: ws://localhost:4000/socket
    volumes:
      - .:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app/backend
    command: go run cmd/server/main.go
    ports:
      - "4000:4000"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/poker_dev
      DB_HOSTNAME: db
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: poker_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend_deps:
  backend_build:
  postgres_data:
