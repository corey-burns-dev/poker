services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: prod
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
        VITE_BACKEND_WS_URL: ${VITE_BACKEND_WS_URL:-ws://localhost:4000/socket}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/poker_prod}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-poker_prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
