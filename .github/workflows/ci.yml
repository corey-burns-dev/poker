name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate-backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    if: github.repository_owner == 'corey-burns-dev'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
      - name: Restore dependencies
        run: cd backend && go mod download
      - name: Compile
        run: cd backend && go build -o /dev/null cmd/server/main.go
      - name: Test
        run: cd backend && go test ./...

  validate-frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest
    if: github.repository_owner == 'corey-burns-dev'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: cd frontend && bun install
      - name: Lint
        run: cd frontend && bun run lint
      - name: Build
        run: cd frontend && bun run build
      - name: Test
        run: cd frontend && bun run test

  publish:
    name: Publish to GHCR
    needs: [validate-backend, validate-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'corey-burns-dev'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/poker-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/poker-frontend:latest
